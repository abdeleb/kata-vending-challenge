name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  quality-gate:
    name: Quality gate (PHP 8.3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      # Runs the same gate as the local `composer ci`: coding style, PHPStan at level max
      # (layer boundaries enforced inside it by PHPat), and the full test suite.
      - name: Quality gate
        run: composer ci
